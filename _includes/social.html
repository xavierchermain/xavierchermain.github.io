<ul class="social-media-list social-media-list-inline">
  {%- if site.github_username -%}
  <li>
    <a href="https://github.com/{{ site.github_username | cgi_escape | escape }}"
       aria-label="GitHub"
       title="GitHub">
      <svg class="svg-icon" aria-hidden="true">
        <use xlink:href="{{ '/assets/minima-social-icons.svg#github' | relative_url }}"></use>
      </svg>
    </a>
  </li>
  {%- endif -%}

  {%- if site.mastodon_username and site.mastodon_instance -%}
  <li>
    <a rel="me"
       href="https://{{ site.mastodon_instance | escape }}/@{{ site.mastodon_username | escape }}"
       aria-label="Mastodon"
       title="Mastodon">
      <svg class="svg-icon" aria-hidden="true" viewBox="0 0 448 512">
        <path d="M433 179.1c0-97.2-63.7-125.7-63.7-125.7C337.2 38.7 281.5 32.5 224.6 32h-1.4c-56.9.5-112.6 6.7-144.7 21.4 0 0-63.7 28.5-63.7 125.7 0 22.2-.4 48.8.3 77 2.3 95 17.4 188.6 105.2 211.9 40.5 10.7 75.3 13 103.3 11.4 50.8-2.8 79.3-18.1 79.3-18.1l-1.7-36.9s-36.3 11.4-77 10.1c-40.4-1.4-83-4.4-89.6-54.3-.6-4.6-.9-9.5-.9-14.6 0 0 39.6 9.7 89.9 12 30.8 1.4 59.7-1.8 89.1-5.3 56.4-6.7 105.5-41.3 111.7-72.9 9.8-49.8 9-121.3 9-121.3zM357.8 304h-47.1V188.8c0-24.3-10.2-36.6-30.7-36.6-22.6 0-33.9 14.6-33.9 43.5v63h-46.8v-63c0-28.9-11.3-43.5-33.9-43.5-20.5 0-30.7 12.3-30.7 36.6V304H87.6V185.4c0-24.3 6.2-43.5 18.5-57.8 12.7-14.2 29.3-21.5 49.9-21.5 23.8 0 41.8 9.1 53.7 27.4L224 157.3l14.3-23.8c11.9-18.3 29.9-27.4 53.7-27.4 20.6 0 37.2 7.3 49.9 21.5 12.3 14.3 18.5 33.5 18.5 57.8V304z"/>
      </svg>
    </a>
  </li>
  {%- endif -%}

  {%- if site.linkedin_username -%}
  <li>
    <a href="https://www.linkedin.com/in/{{ site.linkedin_username | cgi_escape | escape }}"
       aria-label="LinkedIn"
       title="LinkedIn">
      <svg class="svg-icon" aria-hidden="true">
        <use xlink:href="{{ '/assets/minima-social-icons.svg#linkedin' | relative_url }}"></use>
      </svg>
    </a>
  </li>
  {%- endif -%}
</ul>
